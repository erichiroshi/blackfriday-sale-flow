name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v6

      - name: Configurar JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Dar permissão de execução ao Gradle Wrapper
        run: chmod +x ./gradlew

      - name: Cache de dependências do Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Rodar build e testes
        # O runner ubuntu-latest já vem com Docker instalado,
        # necessário para os testes com Testcontainers (Redis, RabbitMQ, Postgres)
        run: ./gradlew build

      - name: Publicar relatório de testes
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: build/reports/tests/test