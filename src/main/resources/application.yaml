spring:
  application:
    name: blackfriday-sale-flow

  datasource:
    hikari:
      # High demand -> keep this generous but bounded; batch persistence
      # runs on its own listener thread pool, not the web request threads.
      maximum-pool-size: 20

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 200
        order_inserts: true

  flyway:
    enabled: true
    locations: classpath:db/migration


  rabbitmq:
    listener:
      simple:
        prefetch: 250

server:
  port: 8080

app:
  demo:
    products:
      - id: TV
        initial-stock: 1200
      - id: PC
        initial-stock: 1450
      - id: GELADEIRA
        initial-stock: 3000

resilience4j:
  retry:
    instances:
      orderBatchPersistence:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        exponential-max-wait-duration: 4s
        retry-exceptions:
          - java.lang.Exception

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus

logging:
  level:
    com.blackfriday.sale: INFO